<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 · wired-mind</title>
  <meta name="robots" content="noindex">
  <!-- Absolute Pfade: die Fehlerseite wird von Nginx unter beliebigen URLs ausgeliefert -->
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="alternate icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <main class="legal container">
    <div class="terminal terminal-404">
      <div class="terminal-bar">
        <span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span>
        <span class="terminal-title">luka@homelab: ~</span>
      </div>
      <div class="terminal-body">
        <p class="term-line"><span class="prompt">luka@homelab:~$</span> open &lt;angeforderte-seite&gt;</p>
        <p class="term-comment">bash: open: 404 – file not found</p>
        <p class="term-comment"># die angeforderte Seite existiert nicht (mehr) · the requested page does not exist</p>
        <p class="term-line term-line-gap">
          <span class="prompt">luka@homelab:~$</span>
          <a href="/">cd ~ &nbsp;# zurück zur Startseite / back to start</a><span class="cursor">▊</span>
        </p>
      </div>
    </div>
  </main>
</body>
</html>
